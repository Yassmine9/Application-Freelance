<ion-header>
  <ion-toolbar class="custom-header">

    <!-- LEFT: Menu -->
    <ion-buttons slot="start">
      <ion-button>
        <ion-icon name="menu-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <!-- CENTER: Logo -->
    <div class="logo-container">
      <img src="assets/logo.png" alt="logo" />
    </div>

    <!-- RIGHT: Notification -->
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="notifications-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content class="home-content"
  [fullscreen]="true"
  [forceOverscroll]="false">
  <div class="hero">
    <div class="hero-badge">Hello! User </div>
    <h1 class="hero-title">Let's find best talent for you</h1>

    <div class="hero-actions">
      
      <ion-searchbar
        class="search-bar"
        placeholder="Search for freelancers, jobs, or projects"
        
      ></ion-searchbar>
    </div>
  </div>
<!-- Service categories  -->
  <section class="feature-section">
    <div class="section-heading">
      <span class="section-kicker">Service category </span>
      <a href="view-all" class="view-all">View all</a>
    </div>

    <div class="feature-grid">
      <article class="feature-card" *ngFor="let feature of features">
        <div class="feature-icon">
          <ion-icon [name]="feature.icon"></ion-icon>
        </div>
        <h3>{{ feature.title }}</h3>
      </article>
    </div>
  </section>
<!-- Top rated freelancers -->
  <section class="feature-section">
    <div class="section-heading">
      <span class="section-kicker">Top rated freelancers </span>
    </div>


    <div class="feature-grid">
      <article class="feature-card" *ngFor="let freelancer of freelancers">
        <div class="freelancer-avatar">
          <img [src]="freelancer.avatar" alt="{{ freelancer.name }}" />
        </div>
        <h3>{{ freelancer.name }}</h3>
      </article>

    </div>
  </section>
  <!-- Top services -->
  <section class="sevices-section">
 <div class="services"> 
    <div class="section-heading">
      <span class="section-kicker">Top services </span>
    </div>
    <div class="services-grid">
      <article class="service-card" *ngFor="let service of services">
        <img [src]="service.image" alt="{{ service.title }}" class="service-image" />
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
      </article>
    </div>
  </div>

  </section>

</ion-content>

<!-- Navbar flottante -->
<div class="custom-navbar">
  <ion-icon name="home-outline"></ion-icon>
  <ion-icon name="search-outline"></ion-icon>

  <div class="notif">
    <ion-icon name="notifications-outline"></ion-icon>
    <span class="badge"></span>
  </div>

  <ion-icon name="person-outline"></ion-icon>
</div>
