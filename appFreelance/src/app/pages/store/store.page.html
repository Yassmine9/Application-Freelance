<ion-header class="ion-no-border">
  <ion-toolbar class="store-toolbar">
    <div class="toolbar-content">

      <div class="header-top">
        <ion-button fill="clear" (click)="goBack()" class="icon-btn">
          <ion-icon name="chevron-back-outline" slot="icon-only"></ion-icon>
        </ion-button>

        <div class="header-center">
          <h1 class="store-title">Store</h1>
        </div>

        <ion-button fill="clear" class="icon-btn">
          <ion-icon name="bag-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>

      <div class="search-wrapper">
        <ion-searchbar
          [(ngModel)]="searchQuery"
          (ionInput)="onSearch()"
          placeholder="Search products..."
          class="store-searchbar"
          animated>
        </ion-searchbar>
      </div>

      <div class="categories-scroll">
        <ion-chip
          [class.active-chip]="selectedCategory === null"
          (click)="selectCategory(null)">
          All
        </ion-chip>

        <ion-chip
          *ngFor="let cat of categories"
          [class.active-chip]="selectedCategory === cat._id"
          (click)="selectCategory(cat._id)">
          {{ cat.name }}
        </ion-chip>
      </div>

    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="store-content">

  <!-- loading -->
  <div class="products-list" *ngIf="isLoading">
    <div class="product-card skeleton-card" *ngFor="let s of [1,2,3,4]">
      <ion-skeleton-text animated class="skeleton-line large"></ion-skeleton-text>
      <ion-skeleton-text animated class="skeleton-line medium"></ion-skeleton-text>
      <ion-skeleton-text animated class="skeleton-line small"></ion-skeleton-text>
    </div>
  </div>

  <!-- empty -->
  <div class="empty-state" *ngIf="!isLoading && products.length === 0">
    <ion-icon name="cube-outline"></ion-icon>
    <h3>No products found</h3>
    <p>Try another search or category</p>
  </div>

  <!-- products -->
  <div class="products-list" *ngIf="!isLoading && products.length > 0">
    <div
      class="product-card"
      *ngFor="let product of products; let i = index"
      (click)="goToProduct(product._id)"
      [class.alt-card]="i % 2 !== 0">

      <div class="card-top">
        <div class="shape"></div>

        <div class="license-chip">
          {{ product.license }}
        </div>

        <div class="price-pill">
          {{ product.price }} T.D
        </div>
      </div>

      <div class="card-content">
        <h2>{{ product.title }}</h2>
        <p>{{ product.description }}</p>

        <div class="card-bottom">
          <div class="downloads">
            <ion-icon name="download-outline"></ion-icon>
            <span>{{ product.downloadCount }} downloads</span>
          </div>

          <button class="view-btn">
            View
            <ion-icon name="arrow-forward-outline"></ion-icon>
          </button>
        </div>
      </div>

    </div>
  </div>

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

</ion-content>
