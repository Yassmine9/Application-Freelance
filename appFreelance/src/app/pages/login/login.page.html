<ion-header class="login-header">
  <ion-toolbar class="login-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" class="back-btn"></ion-back-button>
    </ion-buttons>
    <ion-title class="header-title">Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content" [fullscreen]="true">
  <div class="login-container">
    <div class="login-header-section">
      <div class="logo-container">
        <ion-icon name="log-in-outline" class="logo-icon"></ion-icon>
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <!-- Login Form -->
    <form class="login-form">
      <ion-item class="form-item">
        <ion-icon name="mail-outline" slot="start" class="form-icon"></ion-icon>
        <ion-input 
          type="email" 
          placeholder="Email Address"
          [(ngModel)]="email"
          name="email"
          class="form-input">
        </ion-input>
      </ion-item>

      <ion-item class="form-item">
        <ion-icon name="lock-closed-outline" slot="start" class="form-icon"></ion-icon>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          class="form-input">
        </ion-input>
        <ion-icon 
          [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
          (click)="togglePassword()"
          slot="end"
          class="password-toggle">
        </ion-icon>
      </ion-item>

      <ion-button 
        expand="block" 
        (click)="onLogin()"
        class="submit-button">
        Login
      </ion-button>

      <div class="register-link-container">
        <span class="register-text">Don't have an account?</span>
        <a href="/register" class="register-link">Register</a>
      </div>
    </form>
  </div>
</ion-content>
