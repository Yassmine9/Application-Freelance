<ion-content class="ion-padding">

  <ion-text color="primary">
    <h1><strong>Login</strong></h1>
  </ion-text>

  <ion-list>

    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <br>
      <ion-input type="email" placeholder="email@domain.com"></ion-input>
    </ion-item>


    <ion-item>
      <ion-label position="floating">Password</ion-label>
      <br>
      <ion-input [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password"><ion-icon 
        slot="end"
        [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
        (click)="togglePassword()"
        style="cursor:pointer">
      </ion-icon></ion-input>
      
    </ion-item>

  </ion-list>

  <ion-button expand="block" color="primary" class="ion-margin-top">
    Login
  </ion-button>
  <br>

  <ion-text class="ion-text-center ion-margin-top">
    Don't have an account? <a href="/register">Register</a>
  </ion-text>

</ion-content>
