
<ion-header>
  <ion-toolbar>
<ion-icon name="chevron-back-outline"></ion-icon>
  </ion-toolbar></ion-header>
<ion-content class="ion-padding">
  <ion-title><strong>Create an Account </strong> </ion-title>
<br>
  <ion-text color="medium">
    Already have an account? <a href="/login">Login</a>
  </ion-text>

  <ion-list>
    <ion-item>
      <ion-label position="floating">First Name</ion-label>
      <br>
      <ion-input type="text" placeholder="Enter your first name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Last Name</ion-label>
      <br>
      <ion-input type="text" placeholder="Enter your last name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <br>
      <ion-input type="email" placeholder="email@domain.com"></ion-input>
    </ion-item>
    <ion-item>
  <ion-label position="floating">Password</ion-label>
  <br>
  
  <ion-input
    [type]="showPassword ? 'text' : 'password'"
    placeholder="Enter your password">
    <ion-icon
    name="{{ showPassword ? 'eye-off-outline' : 'eye-outline' }}"
    (click)="togglePassword()"
    slot="end"
    class="password-eye">
  </ion-icon>
  </ion-input>

  
</ion-item>
    <ion-item>
      <ion-label position="floating">Phone Number</ion-label>
      <br>
      <ion-input type="tel" placeholder="Enter your phone number"></ion-input>
    </ion-item>
    <ion-item lines="none">
      <ion-checkbox slot="start" [(ngModel)]="accepted"></ion-checkbox>
      <ion-label>
        I agree to <a href="#">terms of service</a> and <a href="#">privacy policy</a>
      </ion-label>
    </ion-item>

  </ion-list>
  <ion-button expand="block" [disabled]="!accepted" class="ion-margin-top">
   Create Account
  </ion-button>

</ion-content>
