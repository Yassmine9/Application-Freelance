<ion-header>
  <ion-toolbar class="custom-header">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" class="icon-button"></ion-back-button>
    </ion-buttons>
    <ion-title>My Gigs</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="gigs-content" [fullscreen]="true" [forceOverscroll]="false">
  <div class="page-shell">

    <!-- loading -->
    <div *ngIf="isLoading" class="center">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <!-- error -->
    <div *ngIf="error && !isLoading" class="center">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <p>{{ error }}</p>
      <ion-button fill="outline" (click)="loadMyGigs()">Retry</ion-button>
    </div>

    <!-- empty state -->
    <div *ngIf="!isLoading && !error && gigs.length === 0" class="center">
      <ion-icon name="briefcase-outline"></ion-icon>
      <p>You have no gigs yet</p>
      <ion-button (click)="goToCreate()">Create your first gig</ion-button>
    </div>

    <!-- gig list -->
    <div class="gigs-list" *ngIf="!isLoading && !error && gigs.length > 0">
      <article class="gig-card" *ngFor="let gig of gigs">

        <!-- status badge -->
        <div class="card-header">
          <span class="status-badge" [ngClass]="gig.status">
            {{ gig.status }}
          </span>
          <div class="actions">
            <button class="action-btn edit" (click)="goToEdit(gig._id)">
              <ion-icon name="create-outline"></ion-icon>
            </button>
            <button class="action-btn delete" (click)="confirmDelete(gig._id)">
              <ion-icon name="trash-outline"></ion-icon>
            </button>
          </div>
        </div>

        <!-- title -->
        <h2 class="gig-title">{{ gig.title }}</h2>

        <!-- tags -->
        <div class="tags">
          <span class="tag" *ngFor="let tag of gig.tags">{{ tag }}</span>
        </div>

        <!-- price -->
        <div class="price-row">
          <span class="price-label">Price</span>
          <span class="price">${{ gig.price }}</span>
        </div>

      </article>
    </div>

  </div>
</ion-content>

<!-- fab button -->
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button class="app-fab" (click)="goToCreate()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
