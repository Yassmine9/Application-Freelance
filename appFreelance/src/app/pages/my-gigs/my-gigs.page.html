<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/freelancer-profile"></ion-back-button>
    </ion-buttons>
    <ion-title>My Gigs</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- loading -->
  <div *ngIf="isLoading" class="center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <!-- error -->
  <div *ngIf="error && !isLoading" class="center">
    <ion-icon name="alert-circle-outline" size="large" color="danger"></ion-icon>
    <p>{{ error }}</p>
    <ion-button fill="outline" (click)="loadMyGigs()">Retry</ion-button>
  </div>

  <!-- empty state -->
  <div *ngIf="!isLoading && !error && gigs.length === 0" class="center">
    <ion-icon name="briefcase-outline" size="large" color="medium"></ion-icon>
    <p>You have no gigs yet</p>
    <ion-button (click)="goToCreate()">Create your first gig</ion-button>
  </div>

  <!-- gig list -->
  <div *ngIf="!isLoading && !error && gigs.length > 0">
    <ion-card *ngFor="let gig of gigs" class="gig-card">

      <ion-card-content>

        <!-- status badge -->
        <div class="card-header">
          <ion-badge [color]="getStatusColor(gig.status)">
            {{ gig.status }}
          </ion-badge>
          <!-- action buttons -->
          <div class="actions">
            <ion-button
              fill="clear"
              size="small"
              color="primary"
              (click)="goToEdit(gig._id)">
              <ion-icon name="create-outline" slot="icon-only"></ion-icon>
            </ion-button>
            <ion-button
              fill="clear"
              size="small"
              color="danger"
              (click)="confirmDelete(gig._id)">
              <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </div>
        </div>

        <!-- title -->
        <h2 class="gig-title">{{ gig.title }}</h2>

        <!-- tags -->
        <div class="tags">
          <ion-chip
            *ngFor="let tag of gig.tags"
            color="primary"
            outline="true"
            size="small">
            {{ tag }}
          </ion-chip>
        </div>

        <!-- price -->
        <div class="price-row">
          <span class="price-label">Price</span>
          <span class="price">${{ gig.price }}</span>
        </div>

      </ion-card-content>
    </ion-card>
  </div>

</ion-content>

<!-- fab button — alternative way to create -->
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button color="primary" (click)="goToCreate()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
