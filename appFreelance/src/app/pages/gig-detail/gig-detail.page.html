<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/gigs"></ion-back-button>
    </ion-buttons>
    <ion-title>Gig Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- loading -->
  <div *ngIf="isLoading" class="center">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <!-- error -->
  <div *ngIf="error && !isLoading" class="center">
    <ion-icon name="alert-circle-outline" size="large" color="danger"></ion-icon>
    <p>{{ error }}</p>
  </div>

  <!-- content -->
  <div *ngIf="gig && !isLoading">

    <!-- gig image placeholder -->
    <div class="gig-banner">
      <ion-icon name="briefcase-outline" size="large" color="medium"></ion-icon>
    </div>

    <div class="gig-content ion-padding">

      <!-- freelancers -->
      <p class="freelancers-name">
        <ion-icon name="person-circle-outline"></ion-icon>
        {{ gig.freelancers_name }}
      </p>

      <!-- title -->
      <h1 class="gig-title">{{ gig.title }}</h1>

      <!-- tags -->
      <div class="tags">
        <ion-chip
          *ngFor="let tag of gig.tags"
          color="primary"
          outline="true">
          {{ tag }}
        </ion-chip>
      </div>

      

      <!-- description section – forced to be a block -->
      <div class="section description-section">
        <h2 class="section-title">About this gig</h2>
        <p class="description-text">{{ gig.description }}</p>
      </div>

      <!-- delivery days section -->
      <div class="section delivery-section">
        <h2 class="section-title">Estimated delievery duration</h2>
        <p class="delievery-badge">{{ gig.duration }}</p>
      </div>

      

      <!-- contact button -->
      <div class="section">
        <h2 class="section-title">Contact</h2>
        <ion-button expand="block" fill="outline" color="primary">
          <ion-icon name="chatbubble-outline" slot="start"></ion-icon>
          Contact freelancers
        </ion-button>
      </div>

    </div>
  </div>

</ion-content>

<!-- order button fixed at bottom -->
<ion-footer *ngIf="gig && !isLoading">
  <ion-toolbar>
    <div class="order-bar ion-padding">
      <div class="price-info">
        <span class="price-label">Starting at</span>
        <span class="price">${{ gig.price }}</span>
      </div>
      <div class="orders-info">
    <span class="price-label">orders</span>
    <span class="orders-count">{{ gig.stats.total_orders }}</span>
  </div>
      <ion-button
        color="primary"
        (click)="orderGig(gig._id)"
        [disabled]="false">      
        Order Now
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
