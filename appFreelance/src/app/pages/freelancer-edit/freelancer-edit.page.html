<ion-header class="header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/freelancer-profile" class="back-btn"></ion-back-button>
    </ion-buttons>
    <ion-title class="header-title">Edit Profile</ion-title>
    <ion-buttons slot="end">
      <ion-button class="save-top-btn" (click)="saveProfile()">
        <ion-icon name="checkmark-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="edit-content" [fullscreen]="true" [forceOverscroll]="false">
  <div class="page-shell">

    <!-- Avatar -->
    <div class="hero-card">
      <div class="avatar-edit" (click)="avatarInput.click()">
        <img [src]="avatarUrl" *ngIf="avatarUrl" />
        <ion-icon name="camera-outline" *ngIf="!avatarUrl"></ion-icon>
        <input #avatarInput type="file" accept="image/*" hidden (change)="onAvatarSelected($event)" />
      </div>
      <p class="avatar-hint">Tap to change photo</p>
    </div>

    <!-- Basic Info -->
    <div class="form-card">
      <div class="section-header">
        <div class="section-accent"></div>
        <h2 class="section-title">Basic Info</h2>
      </div>

      <div class="field-group">
        <label class="field-label">Display Name</label>
        <ion-input [(ngModel)]="name" placeholder="Your name" class="app-input"></ion-input>
      </div>

      <div class="field-group">
        <label class="field-label">Professional Title</label>
        <ion-input [(ngModel)]="title" placeholder="e.g. Full-Stack Developer" class="app-input"></ion-input>
      </div>

      <div class="field-group">
        <label class="field-label">Bio</label>
        <ion-textarea [(ngModel)]="bio" placeholder="Tell clients about yourself..." [autoGrow]="true" class="app-input app-textarea"></ion-textarea>
      </div>
    </div>

    <!-- Skills -->
    <div class="form-card">
      <div class="section-header">
        <div class="section-accent"></div>
        <h2 class="section-title">Skills</h2>
      </div>
      <div class="field-group">
        <ion-input [(ngModel)]="skills" placeholder="Angular, Ionic, Node.js" class="app-input"></ion-input>
        <p class="input-hint">Separate skills with commas</p>
      </div>
      <div class="skills-preview" *ngIf="skillList.length">
        <span class="skill-pill" *ngFor="let skill of skillList">{{ skill }}</span>
      </div>
    </div>

    <!-- Rates & Stats -->
    <div class="form-card">
      <div class="section-header">
        <div class="section-accent"></div>
        <h2 class="section-title">Rates & Experience</h2>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Hourly Rate ($)</label>
          <ion-input [(ngModel)]="hourlyRate" type="number" placeholder="0" class="app-input"></ion-input>
        </div>
        <div class="field-group">
          <label class="field-label">Experience (years)</label>
          <ion-input [(ngModel)]="experienceYears" type="number" placeholder="0" class="app-input"></ion-input>
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Projects Completed</label>
          <ion-input [(ngModel)]="projectsCompleted" type="number" placeholder="0" class="app-input"></ion-input>
        </div>
        <div class="field-group">
          <label class="field-label">Success Rate (%)</label>
          <ion-input [(ngModel)]="successRate" type="number" placeholder="0" class="app-input"></ion-input>
        </div>
      </div>
    </div>

    <!-- CV -->
    <div class="form-card">
      <div class="section-header">
        <div class="section-accent"></div>
        <h2 class="section-title">CV / Resume</h2>
      </div>

      <label class="file-label" *ngIf="!cvName">
        <ion-icon name="cloud-upload-outline"></ion-icon>
        <div>
          <span>Upload CV</span>
          <small>PDF, DOC, DOCX</small>
        </div>
        <input type="file" accept=".pdf,.doc,.docx" hidden (change)="onFileSelected($event)" />
      </label>

      <div class="cv-file-card" *ngIf="cvName">
        <ion-icon name="document-text-outline" class="cv-icon"></ion-icon>
        <div class="cv-info">
          <span class="cv-filename">{{ cvName }}</span>
          <span class="cv-type">PDF Document</span>
        </div>
        <ion-icon name="close-circle-outline" class="cv-remove" (click)="removeCV()"></ion-icon>
      </div>
    </div>

    <!-- Portfolio -->
    <div class="form-card">
      <div class="section-header">
        <div class="section-accent"></div>
        <h2 class="section-title">Portfolio</h2>
      </div>

      <div *ngFor="let project of projects; let i = index" class="project-edit-card">
        <div class="project-edit-header">
          <span class="project-num">Project {{ i + 1 }}</span>
          <ion-icon name="trash-outline" class="remove-project" (click)="removeProject(i)"></ion-icon>
        </div>
        <ion-input [(ngModel)]="project.title" placeholder="Project title" class="app-input"></ion-input>
        <ion-textarea [(ngModel)]="project.description" placeholder="Short description..." [autoGrow]="true" class="app-input app-textarea"></ion-textarea>
        <ion-input [(ngModel)]="project.link" placeholder="https://..." class="app-input"></ion-input>
      </div>

      <ion-button expand="block" fill="clear" class="add-btn" (click)="addProject()">
        <ion-icon name="add-circle-outline" slot="start"></ion-icon>
        Add Project
      </ion-button>
    </div>

    <!-- Save -->
    <div class="form-card" style="padding-bottom: 24px;">
      <ion-button expand="block" class="save-btn" (click)="saveProfile()">
        <ion-icon name="checkmark-outline" slot="start"></ion-icon>
        Save Changes
      </ion-button>
    </div>

    <div style="height: 40px;"></div>
  </div>
</ion-content>
