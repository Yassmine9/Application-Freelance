<ion-header>
  <ion-toolbar>
    <ion-title>Post a Job</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="form-shell">
    <div class="form-group">
      <label class="form-label">Job Title <span class="required">*</span></label>
      <ion-input
        [(ngModel)]="newOffer.title"
        placeholder="e.g. Build a landing page"
        class="form-input"
        fill="outline">
      </ion-input>
    </div>

    <div class="form-group">
      <label class="form-label">Cahier des charges <span class="required">*</span></label>
      <input
        type="file"
        class="file-input"
        accept=".pdf,.doc,.docx"
        (change)="onCahierChargeSelected($event)" />
    </div>

    <div class="form-group">
      <label class="form-label">Budget (USD) <span class="required">*</span></label>
      <ion-input
        [(ngModel)]="newOffer.budget"
        type="number"
        placeholder="e.g. 500"
        class="form-input"
        fill="outline">
      </ion-input>
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="category-selector">
        <button
          class="cat-btn"
          *ngFor="let c of categories"
          [class.selected]="newOffer.category === c"
          (click)="newOffer.category = c">
          {{ c }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Deadline</label>
      <ion-input
        [(ngModel)]="newOffer.deadline"
        type="date"
        class="form-input"
        fill="outline">
      </ion-input>
    </div>

    <ion-button expand="block" class="submit-btn" [disabled]="isSubmitting" (click)="createOffer()">
      <ion-spinner *ngIf="isSubmitting" name="crescent" slot="start"></ion-spinner>
      {{ isSubmitting ? 'Posting...' : 'Post Job' }}
    </ion-button>
  </div>
</ion-content>

<app-toolbar activeTab="action"></app-toolbar>
