<div class="custom-navbar">
  <!-- When logged in: show role-based menu -->
  <ng-container *ngIf="isLoggedIn">
    <button
      type="button"
      class="nav-item"
      [class.active]="activeTab === 'home'"
      aria-label="Home"
      (click)="goHome()"
    >
      <ion-icon name="home-outline"></ion-icon>
      <span>Home</span>
    </button>

    <!-- Role-specific options -->
    <button
      type="button"
      class="nav-item"
      *ngFor="let option of menuOptions"
      [class.active]="activeTab === option.label.toLowerCase().replace(' ', '-')"
      [attr.aria-label]="option.label"
      (click)="handleMenuAction(option)"
    >
      <ion-icon [name]="option.icon"></ion-icon>
      <span>{{ option.label }}</span>
    </button>
  </ng-container>

  <!-- When NOT logged in: show original navigation -->
  <ng-container *ngIf="!isLoggedIn">
    <button
      type="button"
      class="nav-item"
      [class.active]="activeTab === 'home'"
      aria-label="Home"
      (click)="goHome()"
    >
      <ion-icon name="home-outline"></ion-icon>
      <span>Home</span>
    </button>

    <button
      type="button"
      class="nav-item"
      [class.active]="activeTab === 'store'"
      aria-label="Store"
      (click)="goToStore()"
    >
      <ion-icon name="storefront-outline"></ion-icon>
      <span>Store</span>
    </button>

    <button
      type="button"
      class="nav-item nav-item-center"
      [class.active]="activeTab === 'join'"
      aria-label="Join us"
      (click)="openContactSheet()"
    >
      <span class="center-chip">
        <ion-icon name="log-in-outline"></ion-icon>
      </span>
      <span>Join us</span>
    </button>

    <button
      type="button"
      class="nav-item"
      [class.active]="activeTab === 'search'"
      aria-label="Search"
      (click)="openSearch()"
    >
      <ion-icon name="search-outline"></ion-icon>
      <span>Search</span>
    </button>

    <button
      type="button"
      class="nav-item"
      [class.active]="activeTab === 'nav'"
      aria-label="Navigation scheme"
      (click)="openNavigationScheme()"
    >
      <ion-icon name="git-network-outline"></ion-icon>
      <span>Nav map</span>
    </button>
  </ng-container>
</div>
